name: Deploy site

on:
  push:
    branches: [main]
  workflow_dispatch:        # Manual rebuild button in the Actions tab.
                            # This is your "rebuild after a course repo changed" trigger.

permissions:
  contents: read
  pages: write
  id-token: write

# Let only one deploy run at a time.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive   # pulls in the course repos mounted under docs/
          fetch-depth: 0
          # If your course repos are PRIVATE, the default token can't read them.
          # Create a PAT with repo access, add it as a secret, and uncomment:
          # token: ${{ secrets.SUBMODULES_PAT }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build site
        run: mkdocs build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
