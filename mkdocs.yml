# ZUJ Course Development Hub — site configuration
# Docs: https://squidfunk.github.io/mkdocs-material/

site_name: Dr. Akram Fatayer
site_description: Academic Portfolio & Teaching Hub — AI, Robotics, Computer Vision
site_url: https://akramfatayer.github.io/

theme:
  name: material
  features:
    - navigation.tabs        # top-level tab per course
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - navigation.expand
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy      # copy button on code blocks (useful for your courses)
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.highlight:
      anchor_linenums: true
  - toc:
      permalink: true

plugins:
  - search

nav:
  - Home: index.md
  # - IoT:
  #     - iot/index.md
  - Robotics:
      - robotics/index.md
      - Lectures: robotics/lectures/index.md
      - Labs:
          - Overview: robotics/labs/index.md
          - "Lab 1: Hello, Robot!": robotics/labs/lab-01-hello-robot/README.md
          - "Lab 3: Localization": robotics/labs/lab-03-localization/README.md
          - "Lab 4: Mapping": robotics/labs/lab-04-mapping/README.md
          - "Lab 5: Path Planning": robotics/labs/lab-05-path-planning/README.md
          - "Lab 6: Tracking & Control": robotics/labs/lab-06-tracking-control/README.md
      - Assessments:
          - Overview: robotics/assessments/index.md
          - "Course Summary": robotics/assessments/md/Course_Summary_V2.md
          - "Formula Sheet": robotics/assessments/md/Formula_Sheet_V2.md
          - "Practice Exam": robotics/assessments/md/Practice_Exam_V2.md
          - "Answer Key": robotics/assessments/md/Practice_Exam_V2_Answer_Key.md
  # - Computer Vision:
  #     - computer-vision/index.md
